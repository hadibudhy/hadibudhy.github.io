<footer class="site-footer">
  <div class="container">
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.name }}.</p>
    <ul class="social-links">
      {% if site.author.github %}<li><a href="https://github.com/{{ site.author.github }}" target="_blank" rel="noopener noreferrer">GitHub</a></li>{% endif %}
      {% if site.author.linkedin %}<li><a href="https://linkedin.com/in/{{ site.author.linkedin }}" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>{% endif %}
      {% if site.author.email %}<li><a href="mailto:{{ site.author.email }}">Email</a></li>{% endif %}
    </ul>
  </div>
</footer>
